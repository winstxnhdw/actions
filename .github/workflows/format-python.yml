name: Format

on:
  workflow_call:
    secrets:
      token:
        required: false
      ssh-key:
        required: false

concurrency: ${{ github.workflow }}-${{ github.ref }}
env:
  BRANCH: ${{ github.head_ref || github.ref_name }}

jobs:
  format:
    runs-on: ubuntu-slim
    outputs:
      patched: ${{ steps.patch.outputs.patched }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1
        with:
          show-progress: false
          persist-credentials: false
          ref: ${{ env.BRANCH }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Fix lints
        run: uvx ruff check --diff || uvx ruff check --fix --quiet

      - name: Fix format
        run: uvx ruff format --diff || uvx ruff format --quiet

      - name: Upload format patch
        id: patch
        uses: winstxnhdw/actions/upload-patch@main

  push:
    if: needs.format.outputs.patched
    needs: format
    uses: winstxnhdw/actions/.github/workflows/format-push.yml@main
    with:
      message: "style: format scripts"
    secrets:
      token: ${{ secrets.token }}
      ssh-key: ${{ secrets.ssh-key }}
