name: Format

on: workflow_call

permissions: {}
concurrency: ${{ github.workflow }}-${{ github.ref }}
env:
  BRANCH: ${{ github.head_ref || github.ref_name }}

jobs:
  format:
    runs-on: ubuntu-slim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          show-progress: false
          persist-credentials: false
          ref: ${{ env.BRANCH }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.1

      - name: Fix lints
        run: uvx ruff check --diff || uvx ruff check --fix --quiet

      - name: Fix format
        run: uvx ruff format --diff || uvx ruff format --quiet

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: formatted-files
          path: ${{ github.workspace }}

  push:
    needs: format
    runs-on: ubuntu-slim
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          show-progress: false
          ref: ${{ env.BRANCH }}

      - name: Download artifact
        uses: actions/download-artifact@v8.0.0
        with:
          pattern: formatted-files
          merge-multiple: true
          path: ${{ github.workspace }}

      - name: Set Git config
        run: |
          git config user.email github-actions[bot]@users.noreply.github.com
          git config user.name github-actions[bot]

      - name: Commit changes
        run: |
          git add '*.py' '*.pyi'
          git commit -m "style: format scripts" || exit 0
          git pull --autostash --rebase origin $BRANCH
          git push origin HEAD:$BRANCH
