name: Format

on:
  workflow_call:
    secrets:
      token:
        required: false
      ssh-key:
        required: false

concurrency: ${{ github.workflow }}-${{ github.ref }}
env:
  BRANCH: ${{ github.head_ref || github.ref_name }}

jobs:
  format:
    runs-on: ubuntu-slim
    outputs:
      patched: ${{ steps.patch.outputs.patched }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          show-progress: false
          persist-credentials: false
          ref: ${{ env.BRANCH }}

      - name: Setup Biome
        uses: biomejs/setup-biome@v2.7.1
        with:
          version: latest

      - name: Run Biome
        run: biome check --write .

      - name: Upload format patch
        id: patch
        uses: winstxnhdw/actions/upload-patch@main

  push:
    if: needs.format.outputs.patched
    needs: format
    uses: winstxnhdw/actions/.github/workflows/format-push.yml@main
    secrets:
      token: ${{ secrets.token }}
      ssh-key: ${{ secrets.ssh-key }}
