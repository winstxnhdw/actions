name: Format

on: workflow_call

concurrency: ${{ github.workflow }}-${{ github.ref }}
permissions:
  contents: write

env:
  BRANCH: ${{ github.head_ref || github.ref_name }}

jobs:
  format:
    runs-on: ubuntu-slim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          show-progress: false
          ref: ${{ env.BRANCH }}

      - name: Setup Biome
        uses: biomejs/setup-biome@v2.7.0
        with:
          version: latest

      - name: Run Biome
        run: biome check --write .

      - name: Set Git config
        run: |
          git config user.email github-actions[bot]@users.noreply.github.com
          git config user.name github-actions[bot]

      - name: Commit changes
        run: |
          git commit -am "style: format scripts" || true
          git pull --autostash --rebase origin $BRANCH
          git push
