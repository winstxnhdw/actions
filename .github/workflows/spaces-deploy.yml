name: Deploy

on:
  workflow_call:
    inputs:
      dockerfile:
        default: Dockerfile
    secrets:
      token:
        description: "A Hugging Face API token"
        required: true

permissions: {}
concurrency: ${{ github.workflow }}-${{ github.ref }}
env:
  DOCKERFILE_PATH: ${{ inputs.dockerfile }}

jobs:
  download:
    runs-on: ubuntu-slim
    permissions:
      contents: read

    steps:
      - name: Download Dockerfile from GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -H "Authorization: token $GH_TOKEN" \
               --create-dirs -o "$DOCKERFILE_PATH" \
               -- "https://raw.githubusercontent.com/$GITHUB_REPOSITORY_OWNER/${GITHUB_REPOSITORY#*/}/$GITHUB_REF_NAME/$DOCKERFILE_PATH"

      - name: Upload Dockerfile
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dockerfile
          path: ${{ env.DOCKERFILE_PATH }}

  deploy:
    needs: download
    runs-on: ubuntu-slim
    environment:
      name: production
      url: https://huggingface.co/spaces/${{ github.repository }}

    steps:
      - name: Checkout Hugging Face repository
        run: |
          git clone -c http.extraHeader="Authorization: Bearer $HF_TOKEN" \
                    -- "https://huggingface.co/spaces/$GITHUB_REPOSITORY_OWNER/${GITHUB_REPOSITORY#*/}" .
        env:
          HF_TOKEN: ${{ secrets.token }}

      - name: Download updated Dockerfile
        uses: actions/download-artifact@v8.0.0
        with:
          name: dockerfile

      - name: Set Git config
        run: |
          git config user.email github-actions[bot]@users.noreply.github.com
          git config user.name github-actions[bot]

      - name: Push to Hugging Face Spaces
        env:
          MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          git add "$DOCKERFILE_PATH"
          git commit --amend -m "$MESSAGE"
          git push --force-with-lease
