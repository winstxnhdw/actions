name: Bun

on:
  workflow_call:
    inputs:
      disable-formatter:
        description: "Disable formatter if true"
        type: boolean
      disable-linter:
        description: "Disable linter if true"
        type: boolean
      disable-test:
        description: "Disable tests if true"
        type: boolean
      disable-build:
        description: "Disable build if true"
        type: boolean
      build-args:
        description: "Build arguments"
        type: string

jobs:
  bun:
    runs-on: ubuntu-slim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          show-progress: false
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependenc(ies)
        run: bun install --frozen-lockfile

      - name: Run Biome
        run: bun run biome ci . --formatter-enabled="$ENABLE_FORMATTER" --linter-enabled="$ENABLE_LINTER"
        env:
          ENABLE_FORMATTER: ${{ !inputs.disable-formatter }}
          ENABLE_LINTER: ${{ !inputs.disable-linter }}

      - name: Test
        if: ${{ !inputs.disable-test }}
        run: bun test

      - name: Build
        if: ${{ !inputs.disable-build }}
        env:
          BUILD_ARGS: ${{ inputs.build-args }}
        run: |
          read -a BUILD_ARGS <<< "$BUILD_ARGS"
          bun run build ${BUILD_ARGS[@]}
